<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#menu{
position:absolute;
left:20px;
top:20px;
background:#ffffff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
z-index:10;
width:200px;
}

#menu h3{
margin-top:0;
text-align:center;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:6px;
background:#0077ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0055cc;
}

</style>

</head>

<body>

<div id="menu">

<h3>CRUD VR</h3>

<input id="nome" placeholder="Nome do objeto">

<button onclick="criar()">Criar Objeto</button>

<button onclick="listar()">Atualizar Lista</button>

</div>


<a-scene>

<a-sky color="#1a1a2e"></a-sky>

<a-plane
rotation="-90 0 0"
width="60"
height="60"
color="#3a3a3a">
</a-plane>

<a-light type="ambient" intensity="0.9"></a-light>

<a-light type="directional" position="5 10 5"></a-light>

<a-camera position="0 1.6 10">

<a-cursor
raycaster="objects: .clickable"
fuse="false">
</a-cursor>

</a-camera>

<a-entity id="objetos"></a-entity>

</a-scene>

<script src="app.js"></script>

</body>
</html>
